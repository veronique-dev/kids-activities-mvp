spring:
  application:
    name: payment-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/payment_db}
    username: ${SPRING_DATASOURCE_USERNAME:kids}
    password: ${SPRING_DATASOURCE_PASSWORD:kids123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: ${SERVER_PORT:8085}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-a-long-random-secret-key-at-least-256-bits}
  internal-api-key: ${INTERNAL_API_KEY:internal-dev-key}
  booking-service-url: ${BOOKING_SERVICE_URL:http://localhost:8083}
  stripe:
    enabled: ${STRIPE_ENABLED:false}
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security: INFO
