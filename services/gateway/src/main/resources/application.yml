spring:
  application:
    name: gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/api/auth/**
        - id: users-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/api/users/**
        - id: activity-service
          uri: ${ACTIVITY_SERVICE_URL:http://activity-service:8082}
          predicates:
            - Path=/api/activities/**
        - id: booking-service
          uri: ${BOOKING_SERVICE_URL:http://booking-service:8083}
          predicates:
            - Path=/api/bookings/**

server:
  port: ${SERVER_PORT:8080}

app:
  internal-api-key: ${INTERNAL_API_KEY:internal-dev-key}
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-a-long-random-secret-key-at-least-256-bits}
  services:
    auth: ${AUTH_SERVICE_URL:http://auth-service:8081}
    activity: ${ACTIVITY_SERVICE_URL:http://activity-service:8082}
    booking: ${BOOKING_SERVICE_URL:http://booking-service:8083}

logging:
  level:
    org.springframework.cloud.gateway: INFO
