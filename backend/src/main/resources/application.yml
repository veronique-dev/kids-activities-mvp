spring:
  application:
    name: kids-activities-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kids_activities}
    username: ${SPRING_DATASOURCE_USERNAME:kids}
    password: ${SPRING_DATASOURCE_PASSWORD:kids123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS:false}

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-a-long-random-secret-key-at-least-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  mail:
    enabled: ${MAIL_ENABLED:true}
    from: ${MAIL_FROM:noreply@kidsactivities.fr}
    admin: ${MAIL_ADMIN:admin@kidsactivities.fr}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security: INFO
